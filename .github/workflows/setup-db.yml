name: Setup Supabase Database

on:
  workflow_dispatch:

jobs:
  setup-db:
    runs-on: ubuntu-latest
    steps:
      - name: Run SQL on Supabase
        run: |
          SQL='
          -- إنشاء الجداول
          CREATE TABLE IF NOT EXISTS products (
            id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
            name TEXT NOT NULL,
            unit TEXT DEFAULT '"'"'كيلو'"'"',
            price NUMERIC DEFAULT 0,
            stock NUMERIC DEFAULT 0,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );

          CREATE TABLE IF NOT EXISTS customers (
            id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
            name TEXT NOT NULL,
            shop TEXT DEFAULT '"'"''"'"',
            phone TEXT DEFAULT '"'"''"'"',
            address TEXT DEFAULT '"'"''"'"',
            balance NUMERIC DEFAULT 0,
            notes TEXT DEFAULT '"'"''"'"',
            created_at TIMESTAMPTZ DEFAULT NOW()
          );

          CREATE TABLE IF NOT EXISTS invoices (
            id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
            customer_id UUID,
            num TEXT,
            total NUMERIC DEFAULT 0,
            paid NUMERIC DEFAULT 0,
            remaining NUMERIC DEFAULT 0,
            notes TEXT DEFAULT '"'"''"'"',
            items JSONB DEFAULT '"'"'[]'"'"',
            date DATE DEFAULT CURRENT_DATE,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );

          CREATE TABLE IF NOT EXISTS payments (
            id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
            customer_id UUID,
            amount NUMERIC DEFAULT 0,
            date DATE DEFAULT CURRENT_DATE,
            notes TEXT DEFAULT '"'"''"'"',
            created_at TIMESTAMPTZ DEFAULT NOW()
          );

          CREATE TABLE IF NOT EXISTS inventory (
            id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
            product_id UUID,
            qty NUMERIC DEFAULT 0,
            price NUMERIC DEFAULT 0,
            date DATE DEFAULT CURRENT_DATE,
            notes TEXT DEFAULT '"'"''"'"',
            created_at TIMESTAMPTZ DEFAULT NOW()
          );

          ALTER TABLE products DISABLE ROW LEVEL SECURITY;
          ALTER TABLE customers DISABLE ROW LEVEL SECURITY;
          ALTER TABLE invoices DISABLE ROW LEVEL SECURITY;
          ALTER TABLE payments DISABLE ROW LEVEL SECURITY;
          ALTER TABLE inventory DISABLE ROW LEVEL SECURITY;

          GRANT ALL ON products TO anon, authenticated;
          GRANT ALL ON customers TO anon, authenticated;
          GRANT ALL ON invoices TO anon, authenticated;
          GRANT ALL ON payments TO anon, authenticated;
          GRANT ALL ON inventory TO anon, authenticated;

          DELETE FROM payments;
          DELETE FROM invoices;
          DELETE FROM inventory;
          DELETE FROM customers;
          DELETE FROM products;

          INSERT INTO products (name, unit, price, stock) VALUES
            ('"'"'طحينة'"'"', '"'"'كيلو'"'"', 18.00, 450),
            ('"'"'زيت حار'"'"', '"'"'كيلو'"'"', 22.00, 280);

          INSERT INTO customers (name, shop, phone, address, balance, notes) VALUES
            ('"'"'أحمد محمد السيد'"'"', '"'"'مطعم الشام'"'"', '"'"'0501234567'"'"', '"'"'الرياض - حي النزهة'"'"', 450.00, '"'"'عميل منتظم'"'"'),
            ('"'"'محمد علي حسن'"'"', '"'"'بقالة النور'"'"', '"'"'0559876543'"'"', '"'"'جدة - حي الروضة'"'"', 0.00, '"'"''"'"'),
            ('"'"'خالد إبراهيم عمر'"'"', '"'"'مطعم الخليج'"'"', '"'"'0531112222'"'"', '"'"'الدمام - حي الفيصلية'"'"', 1200.00, '"'"'عميل مميز'"'"'),
            ('"'"'سامي حسن أحمد'"'"', '"'"'سوبرماركت الأمل'"'"', '"'"'0543334444'"'"', '"'"'مكة - حي العزيزية'"'"', 320.00, '"'"''"'"'),
            ('"'"'يوسف عبدالله'"'"', '"'"'مطعم الربيع'"'"', '"'"'0512223333'"'"', '"'"'الرياض - حي الملز'"'"', 0.00, '"'"'عميل جديد'"'"'),
            ('"'"'فيصل الراشد'"'"', '"'"'محل الفيصل'"'"', '"'"'0567778888'"'"', '"'"'الرياض - حي العليا'"'"', 750.00, '"'"'يفضل الدفع نقداً'"'"'),
            ('"'"'عبدالرحمن القحطاني'"'"', '"'"'مطعم البيت العربي'"'"', '"'"'0534445555'"'"', '"'"'جدة - حي الزهراء'"'"', 0.00, '"'"''"'"'),
            ('"'"'ناصر الدوسري'"'"', '"'"'كافيه الياسمين'"'"', '"'"'0523336666'"'"', '"'"'الدمام - حي الشاطئ'"'"', 180.00, '"'"''"'"'),
            ('"'"'طارق الشمري'"'"', '"'"'مطعم طارق'"'"', '"'"'0556667777'"'"', '"'"'الرياض - حي السليمانية'"'"', 0.00, '"'"''"'"'),
            ('"'"'حمد البلوي'"'"', '"'"'بقالة الأمين'"'"', '"'"'0509998888'"'"', '"'"'المدينة المنورة'"'"', 600.00, '"'"'عميل قديم'"'"');
          '

          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/exec_sql" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"SELECT 1\"}" || true

          # Use psql directly via Supabase connection string
          PGPASSWORD="${{ secrets.DB_PASSWORD }}" psql \
            "postgresql://postgres.${{ secrets.PROJECT_REF }}:${{ secrets.DB_PASSWORD }}@aws-0-eu-central-1.pooler.supabase.com:6543/postgres" \
            -c "SELECT 1" 2>&1 | head -5 || echo "Testing connection..."

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
